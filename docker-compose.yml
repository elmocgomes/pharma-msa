services:
  wa-gateway:
    build:
      context: ./infra/wa-gateway
    ports:
      - "5001:5001"
    environment:
      WEBHOOK_BASE_URL: http://api:3000/webhooks/whatsapp
      KEY: ${WA_GATEWAY_KEY}
    volumes:
      - wa-data:/app/.wa-sessions
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      WA_GATEWAY_URL: http://wa-gateway:5001
      WA_GATEWAY_KEY: ${WA_GATEWAY_KEY}
      PORT: "3000"
    depends_on:
      redis:
        condition: service_healthy
      wa-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      WA_GATEWAY_URL: http://wa-gateway:5001
      WA_GATEWAY_KEY: ${WA_GATEWAY_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NAVIGATOR_PROVIDER: ${NAVIGATOR_PROVIDER:-anthropic}
      NAVIGATOR_MODEL: ${NAVIGATOR_MODEL:-claude-haiku-4-5-20251001}
      RECOVERY_PROVIDER: ${RECOVERY_PROVIDER:-anthropic}
      RECOVERY_MODEL: ${RECOVERY_MODEL:-claude-sonnet-4-6}
      EXTRACTOR_PROVIDER: ${EXTRACTOR_PROVIDER:-anthropic}
      EXTRACTOR_MODEL: ${EXTRACTOR_MODEL:-claude-sonnet-4-6}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  wa-data:
  redis-data:
